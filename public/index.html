<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>ReadStack</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #161616;
      --surface2: #222;
      --surface3: #2a2a2a;
      --border: #333;
      --text: #e8e8e8;
      --text2: #999;
      --text3: #666;
      --accent: #4f9cf7;
      --green: #34d399;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --red: #f87171;
      --purple: #a78bfa;
      --pink: #f472b6;
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ---- Header ---- */
    .header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .header h1 span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-stats {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text2);
    }
    .header-stats strong { color: var(--text); }

    /* AI Status indicator */
    .ai-status {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      display: none;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
    .ai-status.active {
      display: flex;
      background: rgba(79,156,247,0.12);
      color: var(--accent);
    }
    .ai-spinner {
      width: 10px; height: 10px;
      border: 2px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Input Area ---- */
    .input-area {
      padding: 16px 20px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--text3); }
    .input-row .add-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-weight: 700;
      font-size: 22px;
      width: 50px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .input-row .add-btn:active { opacity: 0.7; }
    .input-row .import-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-size: 13px;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .input-row .import-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 20px;
      margin-top: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid var(--border);
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 12px 16px 10px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      background: none;
      color: var(--text3);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text2); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .badge {
      font-size: 10px;
      background: var(--surface2);
      color: var(--text2);
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .tab.active .badge { background: rgba(79,156,247,0.15); color: var(--accent); }

    /* ---- Item List ---- */
    .list-container { padding: 8px 20px 120px; }
    .list-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    .list-empty .emoji { font-size: 40px; margin-bottom: 12px; }
    .list-empty p { font-size: 14px; line-height: 1.5; }

    /* ---- Single Item Row ---- */
    .item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      transition: opacity 0.3s;
    }
    .item:last-child { border-bottom: none; }
    .item.removing {
      opacity: 0;
      transform: translateX(40px);
      transition: all 0.35s;
    }

    .item-priority {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      background: var(--surface2);
      color: var(--text3);
    }
    .item-priority.p-high { background: rgba(248,113,113,0.15); color: var(--red); }
    .item-priority.p-med { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .item-priority.p-low { background: rgba(52,211,153,0.15); color: var(--green); }

    .item-rank {
      flex-shrink: 0;
      width: 28px;
      font-size: 14px;
      font-weight: 800;
      color: var(--text3);
      text-align: center;
      padding-top: 2px;
    }

    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.45;
      word-break: break-word;
    }
    .item-title a { color: var(--text); text-decoration: none; }
    .item-title a:hover { color: var(--accent); text-decoration: underline; }

    .item-url {
      font-size: 12px;
      color: var(--text3);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-url a { color: var(--text3); text-decoration: none; }
    .item-url a:hover { color: var(--accent); }

    /* ---- AI Summary ---- */
    .item-summary {
      margin-top: 6px;
      padding: 8px 10px;
      background: var(--surface);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--text2);
    }
    .item-summary .summary-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-summary .summary-label .approach-tag {
      font-weight: 500;
      color: var(--text3);
      text-transform: none;
      letter-spacing: 0;
    }
    .item-summary.ai-pending {
      border-left-color: var(--text3);
      color: var(--text3);
      font-style: italic;
    }
    .item-summary.ai-processing {
      border-left-color: var(--yellow);
    }
    .item-summary.ai-failed {
      border-left-color: var(--red);
      color: var(--text3);
    }

    /* ---- Attachments ---- */
    .item-attachments {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .attachment {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      background: var(--surface2);
      border-radius: 6px;
      font-size: 11px;
      color: var(--text2);
      text-decoration: none;
      border: 1px solid var(--border);
      transition: border-color 0.15s;
    }
    .attachment:hover { border-color: var(--accent); color: var(--accent); }
    .attachment-icon { font-size: 14px; }
    .attachment .att-del {
      margin-left: 4px;
      color: var(--text3);
      cursor: pointer;
      font-size: 12px;
    }
    .attachment .att-del:hover { color: var(--red); }
    .attachment-thumb {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      object-fit: cover;
    }

    /* Upload button */
    .upload-trigger {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      font-size: 11px;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.15s;
    }
    .upload-trigger:hover { border-color: var(--accent); color: var(--accent); }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .item-date { font-size: 11px; color: var(--text3); }
    .pillar-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .pillar-literacy { background: rgba(79,156,247,0.12); color: var(--accent); }
    .pillar-adoption { background: rgba(167,139,250,0.12); color: var(--purple); }
    .pillar-roi { background: rgba(251,191,36,0.12); color: var(--yellow); }
    .tag-experiment { background: rgba(244,114,182,0.12); color: var(--pink); }
    .tag-content { background: rgba(52,211,153,0.12); color: var(--green); }

    .item-actions {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
      padding-top: 2px;
    }
    .item-actions-row {
      display: flex;
      gap: 4px;
    }
    .action-btn {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: none;
      color: var(--text3);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .action-btn:hover { border-color: var(--green); color: var(--green); }
    .action-btn.undo-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    .action-btn.del-btn:hover { border-color: var(--red); color: var(--red); }
    .action-btn.retry-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.attach-btn:hover { border-color: var(--purple); color: var(--purple); }

    .item.is-done .item-title a { color: var(--text3); text-decoration: line-through; }
    .item.is-done .item-title { color: var(--text3); text-decoration: line-through; }
    .done-date { font-size: 11px; color: var(--green); }

    .priority-group-header {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      padding: 16px 0 6px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .priority-group-header .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }

    /* Summarize All button */
    .summarize-all-bar {
      display: flex;
      justify-content: flex-end;
      padding: 8px 0 0;
    }
    .summarize-all-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: none;
      color: var(--text2);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .summarize-all-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      padding: 24px 20px;
      width: 100%;
      max-width: 640px;
      max-height: 80dvh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 17px; margin-bottom: 4px; }
    .modal .hint { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
    .modal textarea {
      width: 100%;
      min-height: 220px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      padding: 12px;
      resize: vertical;
      outline: none;
      line-height: 1.6;
    }
    .modal textarea:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex; gap: 8px;
      margin-top: 12px; justify-content: flex-end;
    }
    .btn {
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: var(--surface2); color: var(--text2); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      color: var(--text);
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 300;
      transition: transform 0.3s;
      border: 1px solid var(--border);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Hidden file input */
    .hidden-upload { display: none; }

    @media (min-width: 768px) {
      .list-container, .tabs, .input-area, .header {
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Read<span>Stack</span></h1>
  <div class="header-right">
    <div class="ai-status" id="ai-status" title="Gemma 4 summarizing...">
      <div class="ai-spinner"></div>
      <span id="ai-status-text">Summarizing...</span>
    </div>
    <div class="header-stats">
      <div><strong id="stat-pending">0</strong> pending</div>
      <div><strong id="stat-done">0</strong> done</div>
      <div><strong id="stat-week">0</strong> this week</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="quick-input"
      placeholder="Paste link or type: LEARN- topic https://..."
      autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="add-btn" id="add-btn">+</button>
    <button class="import-btn" id="open-import">Bulk</button>
  </div>
</div>

<div class="tabs" id="tabs-bar">
  <button class="tab active" data-tab="all">All <span class="badge" id="badge-all">0</span></button>
  <button class="tab" data-tab="prioritized">Prioritized <span class="badge" id="badge-pri">0</span></button>
  <button class="tab" data-tab="experiments">Experiments <span class="badge" id="badge-exp">0</span></button>
  <button class="tab" data-tab="content">Content Ideas <span class="badge" id="badge-con">0</span></button>
  <button class="tab" data-tab="done">Done <span class="badge" id="badge-done">0</span></button>
</div>

<div class="list-container" id="list-container"></div>

<input type="file" class="hidden-upload" id="file-upload" accept=".png,.jpg,.jpeg,.gif,.webp,.pdf,.md,.txt">

<!-- Bulk Import Modal -->
<div class="modal-overlay" id="import-modal">
  <div class="modal">
    <h2>Bulk Import</h2>
    <p class="hint">Paste your notepad list. Prefixes like LEARN-, CONTENT-, BUILD- are auto-parsed. Gemma 4 will summarize each in the background.</p>
    <textarea id="import-text" placeholder="- LEARN- gemma 4 https://example.com
- CONTENT- linkedin post https://example.com
- BUILD- start week 1 agent https://example.com"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="import-cancel">Cancel</button>
      <button class="btn btn-primary" id="import-go">Import All</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== State ======
let currentTab = 'all';
let pollTimer = null;
let uploadTargetId = null;

const $list = document.getElementById('list-container');
const $input = document.getElementById('quick-input');
const $toast = document.getElementById('toast');
const $fileUpload = document.getElementById('file-upload');

// ====== API ======
async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return res.json();
}

// ====== Data Loading ======
async function loadTab() {
  let items;
  if (currentTab === 'all') items = await api('/items?status=pending');
  else if (currentTab === 'prioritized') items = await api('/items/prioritized');
  else if (currentTab === 'experiments') items = await api('/items/experiments');
  else if (currentTab === 'content') items = await api('/items/content');
  else if (currentTab === 'done') items = await api('/items/done');

  render(items);
  loadStats();
  checkAiStatus();
}

async function loadStats() {
  const s = await api('/stats');
  document.getElementById('stat-pending').textContent = s.pending;
  document.getElementById('stat-done').textContent = s.completed;
  document.getElementById('stat-week').textContent = s.completedThisWeek;
  document.getElementById('badge-all').textContent = s.pending;
  document.getElementById('badge-pri').textContent = s.prioritized;
  document.getElementById('badge-exp').textContent = s.experiments;
  document.getElementById('badge-con').textContent = s.content;
  document.getElementById('badge-done').textContent = s.completed;
}

async function checkAiStatus() {
  const status = await api('/ai-status');
  const $ai = document.getElementById('ai-status');
  const $aiText = document.getElementById('ai-status-text');
  const active = status.processing + status.pending;
  if (active > 0) {
    $ai.classList.add('active');
    $aiText.textContent = `Summarizing ${active}...`;
    // Poll for updates while summarization is active
    if (!pollTimer) {
      pollTimer = setInterval(async () => {
        const s2 = await api('/ai-status');
        const a2 = s2.processing + s2.pending;
        if (a2 === 0) {
          clearInterval(pollTimer);
          pollTimer = null;
          $ai.classList.remove('active');
          loadTab(); // refresh to show new summaries
        } else {
          $aiText.textContent = `Summarizing ${a2}...`;
          loadTab(); // refresh periodically to show progress
        }
      }, 5000);
    }
  } else {
    $ai.classList.remove('active');
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }
}

// ====== Rendering ======
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const day = d.getDate();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${day} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function formatUrl(url) {
  if (!url) return '';
  try {
    const u = new URL(url);
    let display = u.hostname.replace('www.', '');
    if (u.pathname.length > 1) display += u.pathname.substring(0, 30);
    if (u.pathname.length > 30) display += '...';
    return display;
  } catch { return url.slice(0, 50); }
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pillarTags(analysis) {
  let html = '';
  if (analysis.pillars.literacy > 0) html += '<span class="pillar-tag pillar-literacy">Literacy</span>';
  if (analysis.pillars.adoption > 0) html += '<span class="pillar-tag pillar-adoption">Adoption</span>';
  if (analysis.pillars.roi > 0) html += '<span class="pillar-tag pillar-roi">ROI</span>';
  return html;
}

function getPriorityClass(score) {
  if (score >= 10) return 'p-high';
  if (score >= 5) return 'p-med';
  return 'p-low';
}

function getPriorityBucket(score) {
  if (score >= 12) return { label: 'Critical \u2014 Read Immediately', color: 'var(--red)' };
  if (score >= 8) return { label: 'High Priority', color: 'var(--orange)' };
  if (score >= 5) return { label: 'Medium Priority', color: 'var(--yellow)' };
  return { label: 'Worth Reading', color: 'var(--green)' };
}

function renderSummary(item) {
  const s = item.ai_status || 'pending';
  if (s === 'done' && item.ai_summary) {
    const displayTitle = item.ai_title && item.ai_title !== item.title
      ? `<strong>${esc(item.ai_title)}</strong><br>` : '';
    const approachLabel = item.ai_approach === 'full' ? 'fetched content' : 'inferred from URL';
    return `<div class="item-summary">
      <div class="summary-label">Gemma 4 Summary <span class="approach-tag">(${approachLabel})</span></div>
      ${displayTitle}${esc(item.ai_summary)}
    </div>`;
  }
  if (s === 'processing') {
    return `<div class="item-summary ai-processing">
      <div class="summary-label" style="color:var(--yellow)"><div class="ai-spinner" style="border-color:var(--yellow);border-top-color:transparent;width:8px;height:8px"></div> Gemma 4 summarizing...</div>
    </div>`;
  }
  if (s === 'failed') {
    return `<div class="item-summary ai-failed">
      <div class="summary-label" style="color:var(--red)">Summary failed</div>
      Click retry to try again
    </div>`;
  }
  // pending — show nothing (will process soon)
  return '';
}

function renderAttachments(item) {
  const atts = item.attachments || [];
  if (atts.length === 0) return '';

  const items = atts.map(att => {
    const isImage = /\.(png|jpg|jpeg|gif|webp)$/i.test(att.filename);
    const isPdf = /\.pdf$/i.test(att.filename);
    const icon = isImage ? '\u{1F5BC}' : isPdf ? '\u{1F4C4}' : '\u{1F4CE}';

    return `<a href="/uploads/${esc(att.filename)}" target="_blank" class="attachment" title="${esc(att.originalName)}">
      ${isImage ? `<img src="/uploads/${esc(att.filename)}" class="attachment-thumb" alt="">` : `<span class="attachment-icon">${icon}</span>`}
      <span>${esc(att.originalName.length > 20 ? att.originalName.slice(0,17) + '...' : att.originalName)}</span>
      <span class="att-del" onclick="event.preventDefault();event.stopPropagation();deleteAttachment(${item.id},'${esc(att.filename)}')">\u2715</span>
    </a>`;
  }).join('');

  return `<div class="item-attachments">${items}</div>`;
}

function renderItem(item, opts = {}) {
  const { showRank, rank, showPriority, isDone } = opts;
  const a = item.analysis;

  // Use AI title if available and original title is just a domain
  const displayTitle = item.ai_title && (!item.title || item.title.length < 5) ? item.ai_title : item.title;

  const titleContent = item.url
    ? `<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(displayTitle || formatUrl(item.url))}</a>`
    : esc(displayTitle || 'Untitled');

  const notesLinks = item.notes ? item.notes.split('\n').filter(n => n.startsWith('http')).map(n =>
    `<a href="${esc(n)}" target="_blank" rel="noopener">${esc(formatUrl(n))}</a>`
  ).join(' \u00B7 ') : '';

  const showRetry = (item.ai_status === 'failed' || item.ai_status === 'pending');

  return `
    <div class="item ${isDone ? 'is-done' : ''}" id="item-${item.id}">
      ${showRank ? `<div class="item-rank">${rank}</div>` : ''}
      ${showPriority ? `<div class="item-priority ${getPriorityClass(a.priority_score)}">${a.priority_score}</div>` : ''}
      <div class="item-body">
        <div class="item-title">${titleContent}</div>
        ${item.url ? `<div class="item-url"><a href="${esc(item.url)}" target="_blank">${formatUrl(item.url)}</a></div>` : ''}
        ${notesLinks ? `<div class="item-url">${notesLinks}</div>` : ''}
        ${renderSummary(item)}
        ${renderAttachments(item)}
        <div class="item-meta">
          <span class="item-date">Added: ${formatDate(item.created_at)}</span>
          ${isDone && item.completed_at ? `<span class="done-date">Read: ${formatDate(item.completed_at)}</span>` : ''}
          ${pillarTags(a)}
          ${a.is_experiment ? '<span class="pillar-tag tag-experiment">Experiment</span>' : ''}
          ${a.is_content ? '<span class="pillar-tag tag-content">Content</span>' : ''}
        </div>
      </div>
      <div class="item-actions">
        <div class="item-actions-row">
          ${isDone
            ? `<button class="action-btn undo-btn" onclick="markPending(${item.id})" title="Mark unread">\u21B6</button>`
            : `<button class="action-btn" onclick="markDone(${item.id})" title="Mark as read">\u2713</button>`
          }
          <button class="action-btn del-btn" onclick="deleteItem(${item.id})" title="Delete">\u2715</button>
        </div>
        <div class="item-actions-row">
          ${showRetry ? `<button class="action-btn retry-btn" onclick="retrySummarize(${item.id})" title="Summarize with Gemma 4">\u2728</button>` : ''}
          <button class="action-btn attach-btn" onclick="triggerUpload(${item.id})" title="Attach file">\u{1F4CE}</button>
        </div>
      </div>
    </div>`;
}

function render(items) {
  if (!items || items.length === 0) {
    const messages = {
      all: 'No items in your backlog. Paste a link above to get started.',
      prioritized: 'No items match your AI&Beyond priorities yet.',
      experiments: 'No experiment candidates detected yet.',
      content: 'No content creation opportunities found yet.',
      done: 'Nothing completed yet. Start reading!'
    };
    $list.innerHTML = `<div class="list-empty"><div class="emoji">${currentTab === 'done' ? '\u{1F680}' : '\u{1F4DA}'}</div><p>${messages[currentTab]}</p></div>`;
    return;
  }

  // Summarize All button for unsummarized items
  const unsummarized = items.filter(i => i.ai_status === 'pending' || i.ai_status === 'failed').length;
  let topBar = '';
  if (unsummarized > 0 && currentTab !== 'done') {
    topBar = `<div class="summarize-all-bar">
      <button class="summarize-all-btn" onclick="summarizeAll()">
        \u2728 Summarize ${unsummarized} unsummarized
      </button>
    </div>`;
  }

  if (currentTab === 'prioritized') {
    const buckets = {};
    items.forEach((item, i) => {
      const bucket = getPriorityBucket(item.analysis.priority_score);
      if (!buckets[bucket.label]) buckets[bucket.label] = { color: bucket.color, items: [] };
      buckets[bucket.label].items.push({ item, rank: i + 1 });
    });

    let html = topBar;
    for (const [label, data] of Object.entries(buckets)) {
      html += `<div class="priority-group-header"><span class="dot" style="background:${data.color}"></span>${label}</div>`;
      data.items.forEach(({ item, rank }) => {
        html += renderItem(item, { showRank: true, rank, showPriority: true });
      });
    }
    $list.innerHTML = html;
    return;
  }

  if (currentTab === 'done') {
    $list.innerHTML = items.map(item => renderItem(item, { isDone: true })).join('');
    return;
  }

  $list.innerHTML = topBar + items.map(item => renderItem(item, {})).join('');
}

// ====== Actions ======
async function addItem() {
  const raw = $input.value.trim();
  if (!raw) return;
  await api('/items', { method: 'POST', body: { raw } });
  $input.value = '';
  toast('Added! Gemma 4 summarizing...');
  loadTab();
}

async function markDone(id) {
  const el = document.getElementById('item-' + id);
  if (el) el.classList.add('removing');
  await api(`/items/${id}`, { method: 'PATCH', body: { status: 'done' } });
  toast('Marked as read');
  setTimeout(loadTab, 300);
}

async function markPending(id) {
  await api(`/items/${id}`, { method: 'PATCH', body: { status: 'pending' } });
  toast('Moved back to backlog');
  loadTab();
}

async function deleteItem(id) {
  const el = document.getElementById('item-' + id);
  if (el) el.classList.add('removing');
  await api(`/items/${id}`, { method: 'DELETE' });
  setTimeout(loadTab, 300);
}

async function retrySummarize(id) {
  toast('Summarizing with Gemma 4...');
  fetch(`/api/items/${id}/summarize`, { method: 'POST' });
  // Refresh after a delay to show processing state
  setTimeout(loadTab, 1000);
  // Then poll
  setTimeout(loadTab, 8000);
  setTimeout(loadTab, 15000);
}

async function summarizeAll() {
  const result = await api('/summarize-all', { method: 'POST' });
  toast(result.message);
  checkAiStatus();
}

function triggerUpload(id) {
  uploadTargetId = id;
  $fileUpload.click();
}

async function handleUpload(file) {
  if (!uploadTargetId || !file) return;
  const formData = new FormData();
  formData.append('file', file);

  const res = await fetch(`/api/items/${uploadTargetId}/attachments`, {
    method: 'POST',
    body: formData
  });
  if (res.ok) {
    toast('File attached!');
    loadTab();
  } else {
    toast('Upload failed');
  }
  uploadTargetId = null;
}

async function deleteAttachment(itemId, filename) {
  await fetch(`/api/items/${itemId}/attachments/${filename}`, { method: 'DELETE' });
  loadTab();
}

async function batchImport() {
  const text = document.getElementById('import-text').value.trim();
  if (!text) return;
  const result = await api('/items/batch', { method: 'POST', body: { text } });
  toast(`Imported ${result.imported} items. Gemma 4 summarizing...`);
  document.getElementById('import-text').value = '';
  document.getElementById('import-modal').classList.remove('open');
  loadTab();
}

function toast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  setTimeout(() => $toast.classList.remove('show'), 2500);
}

// ====== Event Listeners ======
document.getElementById('add-btn').addEventListener('click', addItem);
$input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

$input.addEventListener('paste', () => {
  setTimeout(() => {
    const val = $input.value.trim();
    if (/^https?:\/\/\S+$/.test(val)) setTimeout(addItem, 100);
  }, 50);
});

document.getElementById('tabs-bar').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentTab = tab.dataset.tab;
  loadTab();
});

document.getElementById('open-import').addEventListener('click', () => {
  document.getElementById('import-modal').classList.add('open');
});
document.getElementById('import-cancel').addEventListener('click', () => {
  document.getElementById('import-modal').classList.remove('open');
});
document.getElementById('import-go').addEventListener('click', batchImport);
document.getElementById('import-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('import-modal').classList.remove('open');
});

$fileUpload.addEventListener('change', e => {
  if (e.target.files.length > 0) handleUpload(e.target.files[0]);
  e.target.value = ''; // reset
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

// ====== Init ======
loadTab();
</script>
</body>
</html>
